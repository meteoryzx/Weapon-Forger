<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《打了个铁》· 数值→故事 探路原型</title>
<style>
  :root{
    --bg:#1a1410; --panel:#241c16; --panel2:#2e2419; --line:#4a3a28;
    --ink:#f3e6d0; --dim:#b09a7c; --gold:#e5a53b; --ember:#e0632c;
    --ok:#8fbf4f; --bad:#d0483f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.7; padding:24px 16px; max-width:760px; margin:0 auto;
    background-image:radial-gradient(circle at 50% -10%, #3a2c1c 0%, #1a1410 55%);
    min-height:100vh;
  }
  h1{font-size:22px;font-weight:700;letter-spacing:1px;text-align:center;color:var(--gold);text-shadow:0 2px 0 #000}
  .sub{text-align:center;color:var(--dim);font-size:13px;margin:6px 0 22px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:18px;box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .panel h2{font-size:15px;color:var(--gold);margin-bottom:14px;font-weight:600}
  .slider-row{display:flex;align-items:center;gap:12px;margin:11px 0}
  .slider-row label{width:52px;font-size:14px;color:var(--ink);flex-shrink:0}
  .slider-row input[type=range]{flex:1;accent-color:var(--ember);height:6px}
  .val{width:52px;text-align:right;font-variant-numeric:tabular-nums}
  .val b{color:var(--gold);font-size:17px}
  .val i{color:var(--dim);font-style:normal;font-size:12px}
  .presets{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .presets button{background:var(--panel2);color:var(--dim);border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;transition:.15s}
  .presets button:hover{color:var(--gold);border-color:var(--gold)}
  .forge{width:100%;margin-top:16px;background:linear-gradient(180deg,#e5a53b,#e0632c);color:#2a1a08;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 0 #7a3a10}
  .forge:active{transform:translateY(2px);box-shadow:0 2px 0 #7a3a10}
  #story .node{border-left:3px solid var(--line);padding:4px 0 14px 16px;margin-left:6px;position:relative;animation:fade .5s both}
  #story .node::before{content:'';position:absolute;left:-7px;top:6px;width:11px;height:11px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 3px var(--panel)}
  #story .node.ok::before{background:var(--ok)} #story .node.bad::before{background:var(--bad)}
  #story .node .tag{font-size:11px;color:var(--dim);letter-spacing:1px}
  #story .node .txt{font-size:14.5px;margin-top:3px}
  #story .node .judge{font-size:12px;margin-top:5px;color:var(--dim)}
  #story .node .judge b.o{color:var(--ok)} #story .node .judge b.x{color:var(--bad)}
  #ending{margin-top:16px;padding:16px;border-radius:12px;text-align:center;animation:fade .6s both}
  #ending.good{background:#2a3618;border:1px solid var(--ok)}
  #ending.mid{background:#2e2419;border:1px solid var(--line)}
  #ending.bad{background:#361816;border:1px solid var(--bad)}
  #ending.legend{background:#3a2e10;border:1px solid var(--gold);box-shadow:0 0 24px rgba(229,165,59,.3)}
  #ending .et{font-size:18px;font-weight:700;margin-bottom:6px}
  #ending.good .et{color:var(--ok)} #ending.bad .et{color:var(--bad)} #ending.legend .et{color:var(--gold)}
  .hint{color:var(--dim);font-size:12px;text-align:center;margin-top:8px}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .empty{color:var(--dim);text-align:center;padding:20px;font-size:13px}
</style>
</head>
<body>
  <h1>⚒ 打了个铁</h1>
  <div class="sub">数值 → 故事 · 探路原型（验证卖点二：一把武器的 6 维数值能不能撑起一段有趣的冒险）</div>

  <div class="panel">
    <h2>① 捏一把武器（假装你刚锻造完）</h2>
    <div id="sliders"></div>
    <div class="presets">
      <button data-p="6,6,6,5,6,6">均衡好剑</button>
      <button data-p="1,2,2,3,10,4">华而不实（外观10锋利1）</button>
      <button data-p="10,9,2,9,3,3">脆而锋利（易断）</button>
      <button data-p="2,2,2,2,2,2">烧火棍</button>
      <button data-p="8,7,7,4,10,9">传世名刃</button>
      <button data-p="9,3,9,1,7,8">轻灵快刀</button>
    </div>
    <button class="forge" id="go">交给冒险者，出发！</button>
    <div class="hint">拖动滑块或点预设，然后出发。多试几把偏科的，看故事会怎么变。</div>
  </div>

  <div class="panel">
    <h2>② 冒险故事（根据你的武器数值实时生成）</h2>
    <div id="story"><div class="empty">还没有冒险……先捏一把武器出发吧。</div></div>
    <div id="ending"></div>
  </div>

<script>
const DIMS=[["锋利","edge"],["硬度","hard"],["韧性","tough"],["重量","weight"],["外观","look"],["平衡","balance"]];
const state={edge:6,hard:6,tough:6,weight:5,look:6,balance:6};

const sc=document.getElementById('sliders');
DIMS.forEach(([cn,k])=>{
  const row=document.createElement('div');row.className='slider-row';
  row.innerHTML=`<label>${cn}</label><input type="range" min="0" max="10" value="${state[k]}" data-k="${k}"><span class="val" id="v-${k}"><b>${state[k]}</b><i>/10</i></span>`;
  sc.appendChild(row);
});
sc.addEventListener('input',e=>{const k=e.target.dataset.k;state[k]=+e.target.value;document.querySelector('#v-'+k+' b').textContent=state[k];});
document.querySelectorAll('.presets button').forEach(b=>b.onclick=()=>{
  const p=b.dataset.p.split(',').map(Number);
  DIMS.forEach(([_,k],i)=>{state[k]=p[i];document.querySelector('[data-k='+k+']').value=p[i];document.querySelector('#v-'+k+' b').textContent=p[i];});
});

// 判定节点库：每个节点判定某维度，按区间给分支文案与结果(pass/fail/neutral)
const NODES=[
 {tag:"出村·遇拦路强盗",dim:"look",seg:[
   {max:3,txt:"强盗瞟了眼你那把毫不起眼的破铁，嗤笑一声挥手放行——它连抢的价值都没有。",r:"neutral"},
   {max:8,txt:"强盗眼睛一亮，这刀看着值几个钱！他拔刀扑了上来。",r:"fight"},
   {max:10,txt:"刀身流光溢彩，强盗以为你是哪个名门下山历练的少爷，慌忙让开路，连头都不敢抬。",r:"neutral"}
 ]},
 {tag:"密林·恶狼扑杀",dim:"edge",seg:[
   {max:3,txt:"你挥刀去砍，钝得像根木棍，只在狼身上留下白印。它反扑得更凶了。",r:"fail"},
   {max:6,txt:"刀锋划开狼皮，虽不利落，总算逼退了它。",r:"pass"},
   {max:10,txt:"寒光一闪，恶狼应声两断，血都没溅到你身上。",r:"pass"}
 ]},
 {tag:"断崖·独木朽桥",dim:"weight",seg:[
   {max:6,txt:"你和轻巧的佩刀如燕般掠过朽桥，木板只是轻轻一颤。",r:"pass"},
   {max:8,txt:"桥板在脚下呻吟，你屏住呼吸挪了过去，惊出一身冷汗。",r:"pass"},
   {max:10,txt:"沉重的刀身压得朽桥咔咔作响——轰！木板断裂，你连人带刀跌进了谷底激流。",r:"fail"}
 ]},
 {tag:"关隘·守将比武",combo:["edge","hard","tough"],seg:[
   {max:12,txt:"三合之内，你的刀崩了口、又弯了身，守将一脚把你踹下擂台。",r:"fail"},
   {max:20,txt:"一番苦战，刀身虽有磕痕，你终究险胜，守将抱拳放行。",r:"pass"},
   {max:30,txt:"你的刀又快又韧，硬撼守将名器而不落下风，满座喝彩，守将亲自开关相送。",r:"pass"}
 ]},
 {tag:"古庙·封印之门",combo:["look","balance"],hidden:true,seg:[
   {max:14,txt:"庙门上的古老铭文毫无反应——你的刀还配不上这里的秘密。",r:"neutral"},
   {max:20,txt:"铭文微微发亮，似有所感，却终究没有开启。",r:"neutral"},
   {max:20.1,txt:"当刀锋触及庙门，铭文骤然大亮！“持绝世之刃者，可入。”石门轰然洞开……",r:"legend"}
 ]}
];

function pick(seg,v){for(const s of seg){if(v<=s.max)return s;}return seg[seg.length-1];}

function run(){
  const s=state;
  const story=document.getElementById('story');const end=document.getElementById('ending');
  story.innerHTML='';end.className='';end.innerHTML='';
  let alive=true,legend=false,html='';
  for(const n of NODES){
    let v,label;
    if(n.combo){v=n.combo.reduce((a,k)=>a+s[k],0);label=n.combo.map(k=>DIMS.find(d=>d[1]==k)[0]).join('+');}
    else{v=s[n.dim];label=DIMS.find(d=>d[1]==n.dim)[0];}
    // 隐藏结局门槛：外观+平衡需都≥9 (和>20)
    let seg;
    if(n.hidden){ if(s.look>=9&&s.balance>=9) seg=n.seg[2]; else seg=pick(n.seg.slice(0,2),v); }
    else seg=pick(n.seg,v);
    if(!alive){ break; }
    let cls=seg.r=='fail'?'bad':(seg.r=='pass'?'ok':'');
    let judge=`判定【${label}】= ${v} → `;
    if(seg.r=='fight'){judge+='<b class="x">触发战斗</b>（下一节点见分晓）';}
    else if(seg.r=='pass')judge+='<b class="o">通过</b>';
    else if(seg.r=='fail')judge+='<b class="x">失败</b>';
    else if(seg.r=='legend')judge+='<b style="color:var(--gold)">✦ 触发隐藏结局 ✦</b>';
    else judge+='平安通过';
    html+=`<div class="node ${cls}"><div class="tag">${n.tag}</div><div class="txt">${seg.txt}</div><div class="judge">${judge}</div></div>`;
    if(seg.r=='fail'){alive=false;}
    if(seg.r=='legend'){legend=true;}
  }
  story.innerHTML=html;
  if(legend){end.className='legend';end.innerHTML='<div class="et">✦ 隐藏结局 · 古庙传人 ✦</div><div>你的刀开启了尘封的秘境，从此名字被刻进传说。这样的刀，万里挑一。</div>';}
  else if(!alive){end.className='bad';end.innerHTML='<div class="et">冒险失败</div><div>冒险者带着你打的这把刀，倒在了半路上……也许，该回炉重造了。</div>';}
  else{end.className='good';end.innerHTML='<div class="et">平安归来</div><div>冒险者带着你的刀活着回来了，虽无传奇，却也踏实。他说：“这刀，还行。”</div>';}
  end.scrollIntoView({behavior:'smooth',block:'nearest'});
}
document.getElementById('go').onclick=run;
</script>
</body>
</html>
